repos:
-   repo: https://github.com/ambv/black
    rev: 24.10.0
    hooks:
    - id: black
      language_version: python3.11
      args: [--line-length=120]
-   repo: https://gitlab.com/pycqa/flake8
    rev: 7.1.1
    hooks:
    - id: flake8
-   repo: local
    hooks:
    - id: tests
      name: Run tests
      entry: python -m unittest discover -s pynamix/tests -p "test_*.py"
      language: system
      pass_filenames: false
      stages: [pre-push]

